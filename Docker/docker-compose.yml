services:
  sft-server:
    build:
      context: ../RUST
      dockerfile: Dockerfile
    image: sft-rust:alpine
    container_name: sft-server
    volumes:
      - sft-data:/app/ricevuti
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Rome
    healthcheck:
      test: ["CMD", "pgrep", "-f", "sft.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      sft-lan:
        ipv4_address: ${CONTAINER_IP}

volumes:
  sft-data:
    driver: local

networks:
  sft-lan:
    driver: ipvlan
    driver_opts:
      parent: ${PARENT_IFACE}
      ipvlan_mode: l2
    ipam:
      config:
        - subnet: ${LAN_SUBNET}
          gateway: ${LAN_GATEWAY}
